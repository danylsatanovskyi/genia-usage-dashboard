services:
  - type: web
    name: genia-usage-dashboard
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn dash_app:server --workers 1 --timeout 120
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: SMTP_SERVER
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: ALERT_FROM_EMAIL
        sync: false
      - key: ALERT_TO_EMAILS
        sync: false
      - key: DASHBOARD_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: AUTH0_DOMAIN
        sync: false
      - key: AUTH0_CLIENT_ID
        sync: false
      - key: AUTH0_CLIENT_SECRET
        sync: false
      - key: APP_URL
        sync: false
